## OpenTelemetry Collector — receivers / processors / exporters
## Anchor: deck §7 (sampling math + semantic conventions).

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Self-metrics (Prometheus-scrapeable on :8888 — see prometheus.yml)
  prometheus:
    config:
      scrape_configs:
        - job_name: otel-collector
          scrape_interval: 15s
          static_configs:
            - targets: ['localhost:8888']

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s

  # Composite tail-sampling: keep all errors + slow + 1% healthy
  tail_sampling:
    decision_wait: 30s
    num_traces: 50000
    expected_new_traces_per_sec: 100
    policies:
      - name: keep-errors
        type: status_code
        status_code: { status_codes: [ERROR] }
      - name: keep-slow
        type: latency
        latency: { threshold_ms: 2000 }
      - name: probabilistic-1pct
        type: probabilistic
        probabilistic: { sampling_percentage: 1 }

  # Add deployment env to every span/metric resource attribute
  resource:
    attributes:
      - key: deployment.environment
        value: lab
        action: upsert

exporters:
  # Traces → Jaeger via OTLP
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Loki 3.x accepts OpenTelemetry logs at /otlp/v1/logs.
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [tail_sampling, resource, batch]
      exporters: [otlp/jaeger]

    metrics:
      receivers: [otlp, prometheus]
      processors: [resource, batch]
      exporters: [debug]

    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/loki]

  telemetry:
    logs:
      level: warn
    metrics:
      address: 0.0.0.0:8888